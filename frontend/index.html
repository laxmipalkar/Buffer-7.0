<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anuvad - Braille Lipi Assistant</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #00ff88;
            --practice: #00e5ff;
            --text: #ffffff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 20px;
        }

        #letterTitle {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 20px;
            min-height: 60px;
        }

        .app-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .matrix-box {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #333;
            min-width: 250px;
        }

        .braille-grid {
            display: grid;
            grid-template-columns: 80px 80px;
            gap: 25px;
            justify-content: center;
            margin: 20px auto;
            padding: 20px;
            width: fit-content;
        }

        .dot {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: #333;
            border: 3px solid #444;
            transition: 0.3s;
        }

        .dot.active   { background: var(--accent);   border-color: white; box-shadow: 0 0 20px var(--accent);   }
        .dot.p-active { background: var(--practice); border-color: white; box-shadow: 0 0 20px var(--practice); }

        #practiceMatrix { display: none; border: 3px dashed var(--practice); }
        #timerDisplay   { font-size: 1.5rem; color: var(--practice); height: 35px; margin-bottom: 10px; font-weight: bold; }

        .controls { margin-top: 20px; }

        .mode-selection {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        button {
            padding: 12px 25px;
            cursor: pointer;
            border-radius: 8px;
            border: 2px solid #444;
            background: #252525;
            color: white;
            font-weight: bold;
            transition: 0.2s;
            text-transform: uppercase;
        }
        button:hover        { background: #444; border-color: var(--accent); }
        .btn-mode           { border-color: #555; background: #333; font-size: 0.8rem; }
        .btn-practice       { border-color: var(--practice); color: var(--practice); }

        .status { margin-top: 20px; color: #888; font-size: 0.9rem; }
        .mic-active { color: var(--accent) !important; font-weight: bold; }
        .feedback { font-size: 1.2rem; margin-top: 10px; font-weight: bold; min-height: 30px; }

        .progress-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 140px;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden;
            border: 1px solid #444;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            border-radius: 10px;
            transition: width 0.5s ease-in-out;
        }

        .progress-text { font-size: 10px; color: #888; margin-top: 4px; }

        /* Mic status indicator styles */
        #micStatus {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            margin-right: 6px;
            vertical-align: middle;
            transition: background 0.3s;
        }
        #micStatus.listening { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        #micStatus.speaking  { background: #ff9900;       box-shadow: 0 0 8px #ff9900; }
    </style>
</head>
<body>

<h1 id="letterTitle">अनुवाद : Braille Lipi Assistant</h1>
<div id="timerDisplay"></div>

<div class="app-container">
    <div class="matrix-box">
        <h3 id="lessonBoxTitle">Lesson Matrix</h3>
        <div class="braille-grid">
            <div id="dot1" class="dot"></div> <div id="dot4" class="dot"></div>
            <div id="dot2" class="dot"></div> <div id="dot5" class="dot"></div>
            <div id="dot3" class="dot"></div> <div id="dot6" class="dot"></div>
        </div>
    </div>

    <div class="matrix-box" id="practiceMatrix">
        <h3 id="practiceHeader">Practice Matrix</h3>
        <div class="braille-grid">
            <div id="pdot1" class="dot"></div> <div id="pdot4" class="dot"></div>
            <div id="pdot2" class="dot"></div> <div id="pdot5" class="dot"></div>
            <div id="pdot3" class="dot"></div> <div id="pdot6" class="dot"></div>
        </div>
        <div id="practiceFeedback" class="feedback"></div>
    </div>
</div>

<div class="controls">
    <button onclick="fetchData('prev')">Before</button>
    <button onclick="fetchData('current')">Repeat</button>
    <button onclick="fetchData('next')">Next</button>
    <button class="btn-practice" onclick="startPractice()">Practice</button>
    <button class="btn-mode" style="border-color: #ff00ff; color: #ff00ff;" onclick="getAISong()">Listen To It!</button>
    <button class="btn-mode" style="border-color: #ff9900; color: #ff9900;" onclick="getAIStory()">Story</button>

    <div class="mode-selection">
        <div class="progress-group">
            <button class="btn-mode" onclick="fetchData('grade1Alphabets')">G1: Alphabets</button>
            <div class="progress-container">
                <div id="bar-grade1Alphabets" class="progress-bar"></div>
            </div>
            <span id="percent-grade1Alphabets" class="progress-text">0%</span>
        </div>

        <div class="progress-group">
            <button class="btn-mode" onclick="fetchData('grade1Numbers')">G1: Numbers</button>
            <div class="progress-container">
                <div id="bar-grade1Numbers" class="progress-bar"></div>
            </div>
            <span id="percent-grade1Numbers" class="progress-text">0%</span>
        </div>

        <div class="progress-group">
            <button class="btn-mode" onclick="fetchData('learnWords')">G2: Words</button>
            <div class="progress-container">
                <div id="bar-learnWords" class="progress-bar"></div>
            </div>
            <span id="percent-learnWords" class="progress-text">0%</span>
        </div>

        <div class="progress-group">
            <button class="btn-mode" onclick="fetchData('contractions')">G2: Magic words</button>
            <div class="progress-container">
                <div id="bar-contractions" class="progress-bar"></div>
            </div>
            <span id="percent-contractions" class="progress-text">0%</span>
        </div>
    </div>
</div>

<div class="status">
    <p id="micIndicator">
        <span id="micStatus"></span>
        Voice: "Next", "Before", "Repeat", "Practice", "Alphabets", "Numbers", "Words", "Magic words"
    </p>
</div>

<script>
    const API_BASE = "http://localhost:8081/api/lesson";
    fetch(`${API_BASE}/next`).then(r => r.json()).then(d => console.log("TEST:", JSON.stringify(d)));

    const INSTRUCTIONS = "The instructions are: Say next to continue. Say before to go back. Say repeat to hear the dots again. Say practice to start practicing. During practice, use your numpad to enter dots and press 0 to submit.";

    // ─── Speech Recognition Setup ─────────────────────────────────────────────
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let rec = null;
    let recRunning = false; // tracks whether rec is actually started

    if (Recognition) {
        rec = new Recognition();
        rec.lang = 'en-US';
        rec.continuous = true;      // FIX 1: continuous=true avoids stop/start race conditions
        rec.interimResults = false; // only fire on final results
        rec.maxAlternatives = 1;

        rec.onstart = () => {
            recRunning = true;
            setMicStatus('listening');
        };

        rec.onend = () => {
            recRunning = false;
            setMicStatus('idle');
            // FIX 2: auto-restart ONLY when not speaking and app is initialised
            if (appStarted && !isSpeaking) {
                safeStartRec();
            }
        };

        rec.onerror = (e) => {
            recRunning = false;
            console.warn("Speech recognition error:", e.error);
            // 'aborted' fires when we intentionally stop; ignore it
            if (e.error === 'aborted') return;
            // For network / no-speech errors, try restarting after a small delay
            if (appStarted && !isSpeaking) {
                setTimeout(safeStartRec, 500);
            }
        };

        rec.onresult = (e) => {
            // FIX 3: completely ignore voice input while TTS is speaking
            if (isSpeaking) return;

            const cmd = e.results[e.results.length - 1][0].transcript.toLowerCase().trim();
            console.log("Voice command heard:", cmd);

            if      (cmd.includes("practice"))                        startPractice();
            else if (cmd.includes("alphabets"))                       fetchData("grade1Alphabets");
            else if (cmd.includes("numbers"))                         fetchData("grade1Numbers");
            else if (cmd.includes("magic"))                           fetchData("contractions");
            else if (cmd.includes("words"))                           fetchData("learnWords");
            else if (cmd.includes("next"))                            fetchData("next");
            else if (cmd.includes("before") || cmd.includes("back")) fetchData("prev");
            else if (cmd.includes("repeat"))                          fetchData("current");
            else if (cmd.includes("help"))                            speakHelp();
        };
    }

    // Safe wrapper — never throw if rec is already running
    function safeStartRec() {
        if (!rec || recRunning) return;
        try { rec.start(); } catch (e) { console.warn("rec.start() error:", e); }
    }

    // Safe wrapper — never throw if rec is already stopped
    function safeStopRec() {
        if (!rec || !recRunning) return;
        try { rec.stop(); } catch (e) { console.warn("rec.stop() error:", e); }
    }

    function setMicStatus(state) {
        const dot = document.getElementById('micStatus');
        const label = document.getElementById('micIndicator');
        dot.className = '';
        if (state === 'listening') { dot.classList.add('listening'); }
        if (state === 'speaking')  { dot.classList.add('speaking');  }
    }

    // ─── App State ────────────────────────────────────────────────────────────
    let isSpeaking       = false;
    let appStarted       = false; // FIX 4: gate so onend doesn't restart before welcome finishes
    let currentLessonData   = null;
    let currentWordIndex    = 0;
    let currentLetterPattern = 0;
    let practicePattern     = 0;
    let isPracticeRunning   = false;
    let isInputActive       = false;
    let practiceAttempts    = 0;
    let timerInterval       = null;
    let forceRetry          = false;
    let currentMode         = 'grade1Alphabets';

    // ─── Keyboard input for practice ──────────────────────────────────────────
    window.addEventListener('keydown', (e) => {
        if (!isPracticeRunning || !isInputActive) return;

        if (e.key === '0') {
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('timerDisplay').innerText = "";
            evaluatePractice();
            return;
        }

        // Numpad bit-mask mapping
        const map = { '7': 1, '4': 2, '1': 3, '8': 4, '5': 5, '2': 6 };
        if (map[e.key]) {
            practicePattern ^= (1 << (6 - map[e.key]));
            updatePracticeUI();
        }
    });

    // ─── Progress UI ──────────────────────────────────────────────────────────
    function updateProgressUI(lessonId, percentage) {
        const bar  = document.getElementById(`bar-${lessonId}`);
        const text = document.getElementById(`percent-${lessonId}`);
        let validPercent = 0;
        if (typeof percentage === 'number' && !isNaN(percentage)) {
            validPercent = Math.round(percentage);
        }
        if (bar)  bar.style.width = validPercent + "%";
        if (text) text.innerText  = validPercent + "%";
    }

    // ─── fetchData ────────────────────────────────────────────────────────────
    async function fetchData(action, isInitialStartup = false) {
        try {
            window.speechSynthesis.cancel();

            const lessonModes = ['grade1Alphabets', 'grade1Numbers', 'learnWords', 'contractions'];
            if (lessonModes.includes(action)) currentMode = action;

            if (action !== 'current') {
                practiceAttempts = 0;
                currentWordIndex = 0;
            }

            const announcements = {
                'grade1Alphabets': "Grade 1, Lesson 1: Alphabets.",
                'grade1Numbers':   "Grade 1, Lesson 2: Numbers.",
                'learnWords':      "Grade 2, Lesson 1: Words.",
                'contractions':    "Grade 2, Lesson 2: Magic words."
            };

            if (announcements[action]) {
                const prefix = isInitialStartup ? "" : "Lesson Changed. ";
                await speakAndWait(prefix + announcements[action]);
            }

            if (isInitialStartup) {
                await speakAndWait(INSTRUCTIONS);
            }

            const res  = await fetch(`${API_BASE}/${action}`);
            const data = await res.json();

            if (data.progress !== undefined && data.progress !== null) {
                updateProgressUI(currentMode, data.progress);
            }

            currentLessonData = data;
            await render(data);

            if (forceRetry) {
                forceRetry = false;
                startPractice();
            }
        } catch (err) {
            console.error("API Error:", err);
        }
    }

    // ─── startPractice ────────────────────────────────────────────────────────
    async function startPractice() {
        if (isPracticeRunning) return;
        if (!currentLessonData) return;

        isPracticeRunning = true;
        isInputActive = false;
        practicePattern = 0;
        updatePracticeUI();

        currentLetterPattern = currentLessonData.patterns[currentWordIndex];
        document.getElementById('practiceMatrix').style.display = 'block';
        document.getElementById('practiceFeedback').innerText = "";
        document.getElementById('practiceHeader').innerText = `Practice (Attempt ${practiceAttempts + 1}/3)`;

        const msg = practiceAttempts === 0
            ? `Practice started for ${currentLessonData.word[currentWordIndex]}. Press 0 to submit. 10 seconds.`
            : `Attempt ${practiceAttempts + 1}. Try again.`;

        await speakAndWait(msg);

        isInputActive = true;
        let countdown = 10;
        const timerDiv = document.getElementById('timerDisplay');

        timerInterval = setInterval(() => {
            timerDiv.innerText = "Time Left: " + countdown + "s";
            countdown--;
            if (countdown < 0) {
                clearInterval(timerInterval);
                timerDiv.innerText = "";
                evaluatePractice();
            }
        }, 1000);
    }

    // ─── evaluatePractice ─────────────────────────────────────────────────────
    async function evaluatePractice() {
        isInputActive = false;
        isPracticeRunning = false;
        const feedback = document.getElementById('practiceFeedback');

        if (practicePattern === currentLetterPattern) {
            feedback.style.color = "var(--accent)";
            practiceAttempts = 0;
            forceRetry = false;

            if (currentWordIndex < currentLessonData.patterns.length - 1) {
                feedback.innerText = "Correct! Next letter...";
                await speakAndWait("Correct. Next letter.");
                currentWordIndex++;
                startPractice();
            } else {
                feedback.innerText = "Correct! It's Completed.";
                await speakAndWait("Excellent! Correct. Moving to the next.");
                document.getElementById('practiceMatrix').style.display = 'none';
                fetchData('completePractice');
            }
        } else {
            practiceAttempts++;
            if (practiceAttempts < 3) {
                feedback.style.color = "#ffcc00";
                feedback.innerText = `Wrong. Chances: ${3 - practiceAttempts}`;
                await speakAndWait(`Not quite. You have ${3 - practiceAttempts} chances left.`);
                startPractice();
            } else {
                feedback.style.color = "#ff4444";
                feedback.innerText = "Attempt failed. Teaching again.";
                await speakAndWait("Out of attempts. Let's review the dots again.");
                practiceAttempts = 0;
                currentWordIndex = 0;
                forceRetry = true;
                document.getElementById('practiceMatrix').style.display = 'none';
                fetchData('current');
            }
        }
    }

    // ─── render ───────────────────────────────────────────────────────────────
    async function render(data) {
        const title = document.getElementById('letterTitle');
        const lessonBoxTitle = document.getElementById('lessonBoxTitle');

        if (lessonBoxTitle) lessonBoxTitle.innerText = "";

        const prefix = data.type === "alphabet" ? "Letter" : (data.type === "number" ? "Number" : "Word");
        title.innerText = `${prefix}: ${data.word}`;
        await speakAndWait(`${prefix} ${data.word}.`);

        for (let i = 0; i < data.patterns.length; i++) {
            const pattern = data.patterns[i];
            updateDotsUI(pattern);

            if (data.patterns.length > 1 && lessonBoxTitle) {
                lessonBoxTitle.innerText = `-> ${data.word[i]}`;
            }

            let speech = [];
            if (data.type === "word" && data.patterns.length > 1) {
                speech.push(`Letter ${data.word[i]}.`);
            }

            for (let d = 1; d <= 6; d++) {
                if ((pattern & (1 << (6 - d))) !== 0) speech.push(`dot ${d}`);
            }
            await speakAndWait(speech.join(", "));
        }
    }

    // ─── speakAndWait ─────────────────────────────────────────────────────────
    // FIX 5: Stop mic BEFORE speaking; restart AFTER. This prevents the mic from
    // picking up TTS audio as a voice command.
    function speakAndWait(text) {
        return new Promise((resolve) => {
            const utter  = new SpeechSynthesisUtterance(text);
            utter.rate   = 0.9;

            utter.onstart = () => {
                isSpeaking = true;
                setMicStatus('speaking');
                safeStopRec(); // silence mic while TTS plays
            };

            utter.onend = () => {
                isSpeaking = false;
                // Small delay before restarting mic so TTS echo doesn't get captured
                setTimeout(() => {
                    if (appStarted) safeStartRec();
                    setMicStatus('listening');
                    resolve();
                }, 300);
            };

            utter.onerror = () => {
                isSpeaking = false;
                if (appStarted) safeStartRec();
                resolve();
            };

            window.speechSynthesis.speak(utter);
        });
    }

    // ─── Dot UI helpers ───────────────────────────────────────────────────────
    function updateDotsUI(val) {
        for (let i = 1; i <= 6; i++) {
            document.getElementById(`dot${i}`).classList.toggle('active', (val & (1 << (6 - i))) !== 0);
        }
    }

    function updatePracticeUI() {
        for (let i = 1; i <= 6; i++) {
            const isActive = (practicePattern & (1 << (6 - i))) !== 0;
            document.getElementById(`pdot${i}`).classList.toggle('p-active', isActive);
        }
    }

    // ─── Startup ──────────────────────────────────────────────────────────────
    async function startApp() {
        await speakAndWait("Welcome to Anuvad: Your Braille Lipi Assistant.");
        appStarted = true; // FIX 6: only allow mic auto-restart after welcome completes
        safeStartRec();
        await fetchData('grade1Alphabets', true);
    }

    async function speakHelp() {
        window.speechSynthesis.cancel();
        await speakAndWait(INSTRUCTIONS);
    }

    // FIX 7: Use { once: true } properly — trigger startApp on first interaction.
    // After that, mic restarts itself via onend callback.
    window.addEventListener('click', () => { startApp(); }, { once: true });

    // ─── AI Features ──────────────────────────────────────────────────────────
    async function getAISong() {
        if (!currentLessonData) return;
        const currentSubject = currentLessonData.word;
        const firstLetter    = currentSubject.charAt(0);
        try {
            window.speechSynthesis.cancel();
            await speakAndWait("Listen to it");
            const response = await fetch(`http://localhost:8081/api/ai/song?letter=${firstLetter}&object=${currentSubject}`);
            const songText = await response.text();
            await speakAndWait(songText);
        } catch (err) {
            console.error("Gemini Song Error:", err);
            await speakAndWait("Oh no! The music man is tired. Try again later.");
        }
    }

    async function getAIStory() {
        const stories = ["The Tortoise and the Hare", "The Lion and the Mouse", "The Thirsty Crow"];
        const randomStory = stories[Math.floor(Math.random() * stories.length)];
        try {
            window.speechSynthesis.cancel();
            await speakAndWait(`Lets open the big book of stories. Let's hear about ${randomStory}.`);
            const response = await fetch(`http://localhost:8081/api/ai/story?name=${encodeURIComponent(randomStory)}`);
            const storyText = await response.text();
            await speakAndWait(storyText);
        } catch (err) {
            console.error("Gemini Story Error:", err);
            await speakAndWait("The story book is stuck! Let's try again in a moment.");
        }
    }
</script>
</body>
</html>
